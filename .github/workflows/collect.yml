name: collect

# Daily heartbeat: sample the answer engines, rebuild the snapshot, and commit
# it back so trends accumulate on their own. The SQLite DB is gitignored and
# ephemeral in CI, so it's restored from and saved to the actions cache between
# runs — that cache is what carries history forward until the Postgres move.

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily
  workflow_dispatch:
    inputs:
      n:
        description: "samples per feature per provider"
        default: "3"

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore yesterday's history. An immutable per-run key with a shared
      # restore-keys prefix means every run reads the newest cache and writes a
      # fresh one (caches are write-once). Daily runs keep it warm; a >7-day gap
      # can evict it and reset the trend window.
      - name: Restore database
        uses: actions/cache/restore@v4
        with:
          path: aeo.db
          key: aeo-db-${{ github.run_id }}
          restore-keys: |
            aeo-db-

      - name: Collect a snapshot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run.py --n "${{ github.event.inputs.n || '3' }}"

      - name: Refresh recommendations and alerts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python recommend.py

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: aeo.db
          key: aeo-db-${{ github.run_id }}

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data.json web/public/recommendations.json
          if git diff --cached --quiet; then
            echo "no snapshot changes to commit"
          else
            git commit -m "daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
